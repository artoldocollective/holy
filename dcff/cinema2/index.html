<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="noindex, nofollow" name="robots"/>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dress Code Film Festival</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

<style>
  :root{ --cursor-color:transparent; }

  body { margin: 0; font-family: system-ui, sans-serif; overflow: hidden; background: #000; }

  .a-enter-vr-button { display: none !important; }

  #dot {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--cursor-color);
    z-index: 9999;
    pointer-events: none;

    --dot-scale: 1;
    transform: translate(-50%, -50%) scale(var(--dot-scale));
    transform-origin: center center;

    transition: transform 0.15s ease, background 0.18s ease, box-shadow 0.15s ease;
  }

  #dot.hover { transform: translate(-50%, -50%) scale(1.2); }

  #ui {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    background: rgba(255,255,255,.92);
    padding: 10px 12px; border-radius: 12px;
    display:flex; gap:10px; align-items: center; flex-wrap: wrap;
    box-shadow: 0 10px 30px rgba(0,0,0,.15);
  }
  #ui small { opacity: .75; }

  /* LIGHTBOX OVERLAY */
  #lightbox {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,.75);

    display: none;
    align-items: center;
    justify-content: center;

    padding: 18px;

    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    touch-action: pan-y;
  }

  #lightbox .panel {
    position: relative;                 /* NEW */
    z-index: 1;                          /* NEW */

    width: min(980px, 100%);
    background: #fff;
    border-radius: 0px;
    box-shadow: 0 20px 60px rgba(0,0,0,.35);

    display: grid;
    grid-template-columns: 1.4fr 1fr;

    /* NEW: vh fallback for older mobile */
    max-height: calc(100vh - 36px);
    max-height: calc(100dvh - 36px);

    overflow: auto;
  }

  /* Cinema: wider media playback */
  #lightbox .panel.wide{
    width: min(1200px, 100%);
    grid-template-columns: 1fr;
    grid-template-rows: auto auto;
  }
  #lightbox .panel.wide .meta{
    border-top: 1px solid rgba(0,0,0,.10);
  }

  #lightbox .videoWrap{
    width: 100%;
    aspect-ratio: 16 / 9;

    /* NEW: vh fallback */
    max-height: 80vh;
    max-height: 80dvh;
  }
  #lightbox .videoWrap iframe,
  #lightbox .videoWrap video{
    width: 100%;
    height: 100%;
    display:block;
  }

  #lightbox .media {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 420px;
  }

  #lightbox img,
  #lightbox video {
    max-width: 100%;

    /* NEW: vh fallback */
    max-height: 70vh;
    max-height: 70dvh;

    height: auto;
    display: block;
  }

  #lightbox .meta { padding: 16px; }
  #lightbox .meta h2 { margin: 0 0 6px; }
  #lightbox .meta p  { margin: 10px 0 0; line-height: 1.4; }

  #lightbox .close {
    position: absolute;                 /* CHANGED: was fixed */
    top: 18px;
    right: 18px;
    z-index: 10;                        /* NEW */

    width: 52px;
    height: 52px;

    border: 0;
    border-radius: 999px;
    background: rgba(255,255,255,.95);
    cursor: pointer;

    padding: 0;
    display: grid;
    place-items: center;

    box-shadow: 0 10px 30px rgba(0,0,0,.25);
  }

  #lightbox .close::before,
  #lightbox .close::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;

    width: 34px;
    height: 4px;

    background: #000;
    border-radius: 3px;

    transform-origin: center;
  }

  #lightbox .close::before { transform: translate(-50%, -50%) rotate(45deg); }
  #lightbox .close::after  { transform: translate(-50%, -50%) rotate(-45deg); }

  @media (hover: hover) {
    #lightbox .close:hover { background: rgba(0,0,0,.92); }
    #lightbox .close:hover::before,
    #lightbox .close:hover::after { background: #fff; }
  }

  #lightbox .close:focus-visible {
    outline: 3px solid rgba(255,255,255,.9);
    outline-offset: 3px;
  }

  @media (max-width: 900px) {
    #lightbox { padding: 12px; }
    #lightbox .panel {
      grid-template-columns: 1fr;

      /* NEW: vh fallback for older mobile */
      max-height: calc(100vh - 24px);
      max-height: calc(100dvh - 24px);
    }

    #lightbox .media { min-height: 220px; }

    #lightbox img, #lightbox video {
      max-height: 45vh;                 /* NEW fallback */
      max-height: 45dvh;
    }

    #lightbox .close {
      top: 12px;
      right: 12px;
      width: 50px;
      height: 50px;
    }
  }

  #fuseRing {
    position: fixed;
    left: 50%;
    top: 50%;
    width: 42px;
    height: 42px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 9999;

    --p: 0;

    opacity: 0;
    transition: opacity 0.12s ease;
  }
  #fuseRing.active { opacity: 1; }

  #fuseRing::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    background: conic-gradient(var(--cursor-color) calc(var(--p) * 1turn), rgba(0,255,255,0.18) 0);
    -webkit-mask: radial-gradient(farthest-side, transparent 70%, #000 71%);
            mask: radial-gradient(farthest-side, transparent 70%, #000 71%);
    image-rendering: crisp-edges;
    transform: translateZ(0);
  }
</style>

<script>
    (function () {
      const rigBox = new THREE.Box3();
      const tmpBox = new THREE.Box3();
      const center = new THREE.Vector3();

      AFRAME.registerComponent('reset-on-collision', {
        schema: {
          with: { default: '.wall' },
          width:  { default: 0.7 },
          height: { default: 1.7 },
          depth:  { default: 0.7 },
          yOffset:{ default: 0.85 }
        },
        init() {
          this.lastPos = this.el.object3D.position.clone();
          this.lastRot = this.el.object3D.rotation.clone();
        },
        tick() {
          center.copy(this.el.object3D.position);
          center.y += this.data.yOffset;

          rigBox.setFromCenterAndSize(
            center,
            new THREE.Vector3(this.data.width, this.data.height, this.data.depth)
          );

          const colliders = this.el.sceneEl.querySelectorAll(this.data.with);
          for (const c of colliders) {
            tmpBox.setFromObject(c.object3D);
            if (rigBox.intersectsBox(tmpBox)) {
              this.el.object3D.position.copy(this.lastPos);
              this.el.object3D.rotation.copy(this.lastRot);
              return;
            }
          }

          this.lastPos.copy(this.el.object3D.position);
          this.lastRot.copy(this.el.object3D.rotation);
        }
      });
    })();

    (function () {
      AFRAME.registerComponent('walk-portal', {
        schema: {
          url: { default: '' },
          radius: { default: 1.20 },
          cooldownMs: { default: 1500 }
        },
        init() {
          this._last = 0;
          this._rig = null;
          this._tmp = new THREE.Vector3();
        },
        tick() {
          if (!this.data.url) return;
          if (!this._rig) this._rig = document.getElementById('rig');
          if (!this._rig) return;

          const now = performance.now();
          if (now - this._last < this.data.cooldownMs) return;

          const rigPos = this._rig.object3D.position;
          const p = this.el.object3D.getWorldPosition(this._tmp);

          const dx = rigPos.x - p.x;
          const dz = rigPos.z - p.z;
          const dist = Math.sqrt(dx*dx + dz*dz);

          if (dist <= this.data.radius) {
            this._last = now;
            try { window.location.href = this.data.url; } catch (_) {}
          }
        }
      });
    })();
  

// --- Fix poster "glitching" (checkerboard / partial texture issues) ---
// Strategy:
// 1) Always preload poster images into <a-assets> and reference them by #id (more reliable than setting src directly).
// 2) Force safe texture settings (no mipmaps) and avoid depth-sorting artifacts.
AFRAME.registerComponent('fix-poster-texture', {
  init() {
    const apply = () => {
      const mesh = this.el.getObject3D('mesh');
      if (!mesh) return;
      const mat = mesh.material;
      const tex = mat && mat.map;
      if (tex) {
        // Safer defaults for large / NPOT / dataURL images across browsers (esp. Safari)
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.generateMipmaps = false;
        tex.needsUpdate = true;
      }
      if (mat) {
        // Reduce z-fighting and transparency sorting issues with wall/frame
        mat.depthWrite = false;
        mat.polygonOffset = true;
        mat.polygonOffsetFactor = -1;
        mat.polygonOffsetUnits = -1;
        mat.needsUpdate = true;
      }
      // Keep posters in front when transparent objects exist
      this.el.object3D.renderOrder = 10;
    };

    this.el.addEventListener('materialtextureloaded', apply);
    // try once immediately and once after a moment (some browsers apply textures async)
    setTimeout(apply, 0);
    setTimeout(apply, 250);
  }
});
  </script>

<script>

  const sceneEl   = document.getElementById('scene');

  const rigEl     = document.getElementById('rig');
  const cameraEl  = document.getElementById('camera');

  const gallery   = document.getElementById('gallery');
  const portalsEl = document.getElementById('portals');
  const roomVisual    = document.getElementById('roomVisual');
  const roomColliders = document.getElementById('roomColliders');

  const lb       = document.getElementById('lightbox');
  const lbPanel  = document.getElementById('lbPanel');
  const btnClose = document.getElementById('btnClose');
  const lbMedia  = document.getElementById('lbMedia');
  const lbTitle  = document.getElementById('lbTitle');
  const lbSub    = document.getElementById('lbSub');
  const lbDesc   = document.getElementById('lbDesc');

  const dot = document.getElementById('dot');
  const isMobile = (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) ||
                   /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  const cursorEl = document.getElementById('cursor');
  const ring = document.getElementById('fuseRing');

  let rafId = null;
  let startTs = 0;
  let fuseMs = 0;
  let running = false;

  function dotHoverOn()  { if (dot) dot.classList.add('hover'); }
  function dotHoverOff() { if (dot) dot.classList.remove('hover'); }

  function getFuseTimeoutMs() {
    const comp = cursorEl && cursorEl.components && cursorEl.components.cursor;
    if (comp && comp.data && typeof comp.data.fuseTimeout === 'number') return comp.data.fuseTimeout;
    const attr = cursorEl ? cursorEl.getAttribute('cursor') : null;
    if (attr && typeof attr.fuseTimeout === 'number') return attr.fuseTimeout;
    return 1500;
  }

  function setProgress(p) {
    if (!ring) return;
    const clamped = Math.max(0, Math.min(1, p));
    ring.style.setProperty('--p', clamped.toString());
  }

  function fuseStop() {
    running = false;
    if (ring) ring.classList.remove('active');
    setProgress(0);
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
  }

  function fuseTick(ts) {
    if (!running) return;
    const elapsed = ts - startTs;
    const p = fuseMs > 0 ? (elapsed / fuseMs) : 0;
    setProgress(p);

    if (p >= 1) {
      setProgress(1);
      setTimeout(fuseStop, 80);
      return;
    }
    rafId = requestAnimationFrame(fuseTick);
  }

  function fuseStart() {
    if (!ring) return;
    fuseMs = getFuseTimeoutMs();
    startTs = performance.now();
    running = true;
    ring.classList.add('active');
    setProgress(0);
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(fuseTick);
  }

  function pulseDot() {
    if (!dot) return;
    dot.style.setProperty('--dot-scale', '1.5');
    dot.style.background = 'red';
    setTimeout(() => {
      dot.style.setProperty('--dot-scale', '1');
      dot.style.background = getComputedStyle(document.documentElement).getPropertyValue('--cursor-color') || '#0ff';
    }, 200);
  }

  const movementCfg = 'enabled: true; speed: 0.7; constrainToNavMesh: false;';

  function setPointerLockEnabled(enabled) {
    const use = (!isMobile) && enabled;
    cameraEl.setAttribute('look-controls', `pointerLockEnabled: ${use ? 'true' : 'false'}`);
    if (!use && document.pointerLockElement) {
      try { document.exitPointerLock(); } catch (_) {}
    }
  }
  function requestPointerLockIfPossible() {
    if (isMobile) return;
    if (!sceneEl.canvas) return;
    try { sceneEl.canvas.requestPointerLock(); } catch (_) {}
  }

  function disableMovement() { rigEl.setAttribute('movement-controls', 'enabled: false'); }
  function enableMovement()  { rigEl.setAttribute('movement-controls', movementCfg); }

  function clearManagedLink() {
    const existing = document.getElementById('lbLink');
    if (existing && existing.parentNode) existing.parentNode.removeChild(existing);
  }

  function openLightbox(work) {
    pulseDot();
    if (dot) dot.style.display = 'none';

    lbMedia.innerHTML = '';
    lbTitle.textContent = work.title || '(Untitled)';
    lbSub.textContent   = [work.artist, work.year].filter(Boolean).join(' • ');
    lbDesc.textContent  = work.description || '';
    clearManagedLink();

    const linkUrl = (work.linkUrl || '').trim();
    if (linkUrl) {
      const a = document.createElement('a');
      a.id = 'lbLink';
      a.href = linkUrl;
      a.target = '_blank';
      a.rel = 'noopener';
      a.textContent = (work.linkTitle || 'Open link').trim() || 'Open link';
      a.style.display = 'inline-block';
      a.style.marginTop = '12px';
      a.style.color = '#06c';
      lbDesc.parentNode.appendChild(a);
    }

    fuseStop();

    const poster = (work.posterSrc || '').trim();
    // In the cinema, we always show posters on the walls (2:3). Playback happens in the lightbox.
    // Cinema playback: mp4 / youtube / vimeo. If missing, fall back to poster image.
    const playType = (work.playType || '').toLowerCase();
    const playSrc  = (work.playSrc  || '').trim();
    const posterSrc = (work.posterSrc || poster || '').trim();

    // Make the media area wide for playback
    const panel = lb.querySelector('.panel');
    if (panel) panel.classList.toggle('wide', playType === 'mp4' || playType === 'youtube' || playType === 'vimeo');

    function ytEmbed(url){
      try {
        const u = new URL(url);
        if (u.hostname.includes('youtu.be')) {
          const id = u.pathname.replace('/', '').trim();
          return id ? `https://www.youtube.com/embed/${id}?autoplay=1&rel=0` : '';
        }
        if (u.hostname.includes('youtube.com')) {
          if (u.pathname.startsWith('/embed/')) return `https://www.youtube.com${u.pathname}?autoplay=1&rel=0`;
          const id = u.searchParams.get('v');
          return id ? `https://www.youtube.com/embed/${id}?autoplay=1&rel=0` : '';
        }
      } catch(_) {}
      const m = /[?&]v=([^&]+)/.exec(url);
      return m ? `https://www.youtube.com/embed/${m[1]}?autoplay=1&rel=0` : '';
    }
    function vimeoEmbed(url){
      try{
        const u = new URL(url);
        const m1 = /\/video\/(\d+)/.exec(u.pathname);
        const m2 = /(\d+)/.exec(u.pathname);
        const id = (m1 && m1[1]) || (m2 && m2[1]) || '';
        return id ? `https://player.vimeo.com/video/${id}?autoplay=1` : '';
      }catch(_){}
      const m = /(\d+)/.exec(url);
      return m ? `https://player.vimeo.com/video/${m[1]}?autoplay=1` : '';
    }

    if (playType === 'mp4' && playSrc) {
      const wrap = document.createElement('div');
      wrap.className = 'videoWrap';
      const v = document.createElement('video');
      v.src = playSrc;
      v.controls = true;
      v.playsInline = true;
      v.autoplay = true;
      v.loop = false;
      v.style.width = '100%';
      v.style.height = '100%';
      v.style.objectFit = 'contain';
      wrap.appendChild(v);
      lbMedia.appendChild(wrap);
    } else if (playType === 'youtube' && playSrc) {
      const src = ytEmbed(playSrc);
      const wrap = document.createElement('div');
      wrap.className = 'videoWrap';
      const ifr = document.createElement('iframe');
      ifr.src = src || playSrc;
      ifr.allow = 'autoplay; encrypted-media; fullscreen; picture-in-picture';
      ifr.allowFullscreen = true;
      ifr.referrerPolicy = 'origin-when-cross-origin';
      ifr.style.width = '100%';
      ifr.style.height = '100%';
      ifr.style.border = '0';
      wrap.appendChild(ifr);
      lbMedia.appendChild(wrap);
    } else if (playType === 'vimeo' && playSrc) {
      const src = vimeoEmbed(playSrc);
      const wrap = document.createElement('div');
      wrap.className = 'videoWrap';
      const ifr = document.createElement('iframe');
      ifr.src = src || playSrc;
      ifr.allow = 'autoplay; fullscreen; picture-in-picture';
      ifr.allowFullscreen = true;
      ifr.style.width = '100%';
      ifr.style.height = '100%';
      ifr.style.border = '0';
      wrap.appendChild(ifr);
      lbMedia.appendChild(wrap);
    } else {
      const img = document.createElement('img');
      img.src = posterSrc;
      img.alt = work.title || 'Poster';
      lbMedia.appendChild(img);
    }

lb.style.display = 'flex';
    sceneEl.style.pointerEvents = 'none';
    lb.style.pointerEvents = 'auto';

    setPointerLockEnabled(false);
    disableMovement();
  }

  function closeLightbox() {
    lb.style.display = 'none';
    if (dot) dot.style.display = 'block';
    lbMedia.innerHTML = '';
    lbMedia.style.padding = '';
    sceneEl.style.pointerEvents = 'auto';
    clearManagedLink();

    enableMovement();
    fuseStop();

    setPointerLockEnabled(true);
    requestPointerLockIfPossible();
  }

  lb.addEventListener('click', closeLightbox);
  lbPanel.addEventListener('click', (e) => e.stopPropagation());
  window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

  function clearEl(el) { while (el && el.firstChild) el.removeChild(el.firstChild); }

  function readJsonFile(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onerror = reject;
      r.onload = () => {
        try { resolve(JSON.parse(r.result)); }
        catch (e) { reject(e); }
      };
      r.readAsText(file);
    });
  }


  // Accept both:
  // - "cinema_setup.json" (editor save / for re-editing)  -> kind: vicico_setup, works[].posterDataUrl/playDataUrl
  // - exported "exhibit" JSON (used by the movie theater)  -> works[].posterSrc + playSrc
  function normalizeCinemaPayload(obj){
    if (!obj || typeof obj !== 'object') return obj;

    // Back-compat: some older exports used "cinema"
    if (!obj.cinema && obj.cinema) obj.cinema = obj.cinema;

    const looksLikeSetup =
      (obj.kind === 'vicico_setup') ||
      (Array.isArray(obj.works) && obj.works.length && (obj.works[0].posterDataUrl || obj.works[0].playDataUrl));

    if (looksLikeSetup) {
      const room = { width: 18, depth: 18, height: 4, wallColorDefault: '#ffffff' };
      const layout = { worksPerWall: 4, frame: { w: 1.4, h: 2.1, thickness: 0.08 }, spacing: 0.6, y: 1.6 };

      const mappedWorks = (obj.works || []).map(w => {
        const playType = String(w.playType || 'mp4').toLowerCase();
        const playSrc =
          (playType === 'mp4')
            ? String(w.playDataUrl || '').trim()
            : String(w.playUrl || w.playSrc || '').trim();

        const posterSrc = String(w.posterDataUrl || w.mediaDataUrl || '').trim();

        return {
          id: w.id,
          title: w.title,
          artist: w.artist,
          year: w.year,
          description: w.description,
          linkTitle: w.linkTitle || '',
          linkUrl: w.linkUrl || '',
          posterSrc,
          mediaSrc: posterSrc, // keep compatibility with older fields
          playType,
          playSrc
        };
      });

      return {
        version: 1,
        title: (obj.cinema && obj.cinema.name) ? obj.cinema.name : (obj.title || 'My Movie Theater'),
        createdAt: obj.createdAt || new Date().toISOString(),
        cinema: obj.cinema || {},
        settings: { room, layout },
        works: mappedWorks
      };
    }

    return obj;
  }


  function getCinemaMeta(exhibit){
    return (exhibit && exhibit.cinema) ? exhibit.cinema : {};
  }

  function normalizeAdvancedSettings(exhibit) {
    const ex = getCinemaMeta(exhibit);
    const s = (ex && ex.settings) ? ex.settings : {};
    const floorColor = (s.floorColor || s.floor || '').trim();
    const wallsColor = (s.wallsColor || s.wallColor || '').trim();
    const frameColor = (s.frameColor || '').trim();
    const cursorColor = (s.cursorColor || '').trim();

    let portals = Array.isArray(s.portals) ? s.portals.slice(0, 4) : [];

    if (!portals.length) {
      for (let i = 1; i <= 4; i++) {
        const t = (s['portal' + i + 'Title'] || '').trim();
        const u = (s['portal' + i + 'Url'] || s['portal' + i + 'URL'] || '').trim();
        if (t || u) portals.push({ title: t || ('Portal ' + i), url: u });
      }
    }

    if (!portals.length) {
      const t = (s.portalTitle || '').trim();
      const u = (s.portalUrl || s.portalURL || '').trim();
      if (t || u) portals.push({ title: t || 'Portal', url: u });
    }

    while (portals.length < 4) portals.push({ title: '', url: '' });

    return { floorColor, wallsColor, frameColor, cursorColor, portals };
  }

  function applyAdvancedStyling(adv) {
    if (!adv) return;
    if (adv.cursorColor) {
      document.documentElement.style.setProperty('--cursor-color', adv.cursorColor);
      if (dot) dot.style.background = adv.cursorColor;
    }
    if (adv.floorColor) {
      const floor = document.getElementById('floor');
      if (floor) floor.setAttribute('color', adv.floorColor);

  function buildRoom(room) {
    clearEl(roomVisual);
    clearEl(roomColliders);

    const W = room.width ?? 18;
    const D = room.depth ?? 18;
    const H = room.height ?? 4;
    const wallColor = room.wallColorDefault ?? '#ffffff';

    const floor = document.getElementById('floor');
    floor.setAttribute('width', W);
    floor.setAttribute('height', D);

    const walls = [
      { pos: `0 ${H/2} ${-D/2}`, rot: `0 0 0`,    w: W, h: H },
      { pos: `0 ${H/2} ${ D/2}`, rot: `0 180 0`,  w: W, h: H },
      { pos: `${-W/2} ${H/2} 0`, rot: `0 90 0`,   w: D, h: H },
      { pos: `${ W/2} ${H/2} 0`, rot: `0 -90 0`,  w: D, h: H },
    ];
    walls.forEach(w => {
      const p = document.createElement('a-plane');
      p.setAttribute('position', w.pos);
      p.setAttribute('rotation', w.rot);
      p.setAttribute('width', w.w);
      p.setAttribute('height', w.h);
      p.setAttribute('color', wallColor);
      p.setAttribute('material', 'side: double');
      roomVisual.appendChild(p);
    });

    const t = 0.8;
    const mk = (pos,w,h,d) => {
      const b = document.createElement('a-box');
      b.setAttribute('position', pos);
      b.setAttribute('width', w);
      b.setAttribute('height', h);
      b.setAttribute('depth', d);
      b.setAttribute('visible', 'false');
      b.classList.add('wall');
      roomColliders.appendChild(b);
    };
    mk(`0 ${H/2} ${-D/2 - t/2}`, W + t*2, H, t);
    mk(`0 ${H/2} ${ D/2 + t/2}`, W + t*2, H, t);
    mk(`${-W/2 - t/2} ${H/2} 0`, t, H, D + t*2);
    mk(`${ W/2 + t/2} ${H/2} 0`, t, H, D + t*2);

    rigEl.setAttribute('position', `0 0 ${Math.max(6, D/2 - 2)}`);
  }

  /* ===== Portals: BIG circular floor rings ===== */
  function buildPortals(room, adv) {
    clearEl(portalsEl);
    if (!portalsEl || !room || !adv) return;

    const portals = (adv.portals || []).slice(0, 4);
    if (!portals.some(p => (p && (p.title || p.url)))) return;

    const W = room.width ?? 18;
    const D = room.depth ?? 18;

    const x0 = W/2 - 1.35;
    const z0 = D/2 - 1.35;

    const positions = [
      { x: -x0, z: -z0 },
      { x:  x0, z: -z0 },
      { x:  x0, z:  z0 },
      { x: -x0, z:  z0 },
    ];

    const bindPortalInteractive = (el) => {
      el.addEventListener('mouseenter', () => { dotHoverOn(); });
      el.addEventListener('mouseleave', () => { dotHoverOff(); fuseStop(); });
      el.addEventListener('fusing',     () => { fuseStart(); });
      el.addEventListener('click',      () => { fuseStop(); });
    };

    const cursorColor = (adv && adv.cursorColor) ? adv.cursorColor : '#00ffff';

    portals.forEach((p, i) => {
      if (!p) return;
      const title = String(p.title || '').trim();
      const url = String(p.url || '').trim();
      if (!title && !url) return;

      const pos = positions[i] || positions[0];

      const portal = document.createElement('a-entity');
      portal.setAttribute('position', `${pos.x} 0.02 ${pos.z}`);
      portal.setAttribute('walk-portal', `url: ${url}; radius: 1.20; cooldownMs: 1500`);

      portal.setAttribute('animation__bob', `property: position; dir: alternate; dur: ${1900 + i*140}; easing: easeInOutSine; loop: true; to: ${pos.x} 0.10 ${pos.z}`);

      const ringOuter = document.createElement('a-ring');
      ringOuter.setAttribute('rotation', '-90 0 0');
      ringOuter.setAttribute('radius-inner', '0.55');
      ringOuter.setAttribute('radius-outer', '0.95');
      ringOuter.setAttribute('material',
        `shader: standard; side: double; transparent: true; opacity: 0.75; color: ${cursorColor}; emissive: ${cursorColor}; emissiveIntensity: 0.85;`);
      ringOuter.setAttribute('gui-interactable', '');

      const ringInner = document.createElement('a-ring');
      ringInner.setAttribute('rotation', '-90 0 0');
      ringInner.setAttribute('radius-inner', '0.30');
      ringInner.setAttribute('radius-outer', '0.42');
      ringInner.setAttribute('material',
        `shader: standard; side: double; transparent: true; opacity: 0.55; color: ${cursorColor}; emissive: ${cursorColor}; emissiveIntensity: 0.65;`);
      ringInner.setAttribute('gui-interactable', '');

      ringOuter.setAttribute('animation__pulse', 'property: scale; dir: alternate; dur: 900; easing: easeInOutSine; loop: true; to: 1.06 1.06 1.06');
      ringOuter.setAttribute('animation__spin', `property: rotation; dur: ${7000 + i*260}; loop: true; easing: linear; to: -90 -360 0`);
      ringInner.setAttribute('animation__spin', `property: rotation; dur: ${5200 + i*300}; loop: true; easing: linear; to: -90 360 0`);

      bindPortalInteractive(ringOuter);
      bindPortalInteractive(ringInner);

      const go = () => {
        if (!url) return;
        try { window.location.href = url; } catch (_) {}
      };
      ringOuter.addEventListener('click', go);
      ringInner.addEventListener('click', go);

const yaw = Math.atan2(-pos.x, -pos.z) * 180 / Math.PI;

const is34   = (i === 2 || i === 3);
const yLabel = is34 ? 0.62 : 0.55;

// flip Z ONLY for portal 3/4
const zFront = is34 ? -0.05 : 0.05;
const zBack  = -zFront;

const plate = document.createElement('a-plane');
plate.setAttribute('width', '1.65');
plate.setAttribute('height', '0.44');
plate.setAttribute('position', `0 ${yLabel} 0`);
plate.setAttribute('rotation', `0 ${yaw} 0`);
plate.setAttribute('material', 'side: double; opacity: 0.35; transparent: true;');
plate.setAttribute('color', '#000');

const label = document.createElement('a-text');
label.setAttribute('value', title || ('Portal ' + (i + 1)));
label.setAttribute('align', 'center');
label.setAttribute('color', '#fff');
label.setAttribute('width', '5.0');
label.setAttribute('position', `0 ${yLabel} ${zFront}`);
label.setAttribute('rotation', `0 ${yaw} 0`);
label.setAttribute('material', 'side: double; transparent: true; depthTest: false;');
label.setAttribute('render-order', '999');

const labelBack = document.createElement('a-text');
labelBack.setAttribute('value', title || ('Portal ' + (i + 1)));
labelBack.setAttribute('align', 'center');
labelBack.setAttribute('color', '#fff');
labelBack.setAttribute('width', '5.0');
labelBack.setAttribute('position', `0 ${yLabel} ${zBack}`);

      portalsEl.appendChild(portal);

  function buildCinema(exhibit) {
    clearEl(gallery);
    clearEl(portalsEl);

    const room = exhibit.settings?.room || { width: 18, depth: 18, height: 4, wallColorDefault: '#ffffff' };
    const layout = exhibit.settings?.layout || {
      worksPerWall: 4,
      frame: { w: 2.2, h: 1.4, thickness: 0.08 },
      spacing: 0.6,
      y: 1.6
    };
    const works = exhibit.works || [];

    const adv = normalizeAdvancedSettings(exhibit);
    applyAdvancedStyling(adv);
    if (adv.wallsColor) room.wallColorDefault = adv.wallsColor;

    buildRoom(room);
    buildPortals(room, adv);

    const perWall = layout.worksPerWall || 4;
    const walls = ['north', 'east', 'south', 'west'];
    let wallIndex = 0;

    for (let start = 0; start < works.length; start += perWall) {
      const chunk = works.slice(start, start + perWall);
      const wallName = walls[wallIndex % 4];
      chunk.forEach((work, i) => placeWorkOnWall(work, wallName, i, perWall, room, layout, adv));
      wallIndex++;
    }
  }

function hexToRgb(hex){
  let h = String(hex || '').trim().replace('#','');
  if (h.length === 3) h = h.split('').map(c=>c+c).join('');
  if (h.length !== 6) return null;
  const n = parseInt(h, 16);
  return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
}

function invertHex(hex){
  const c = hexToRgb(hex);
  if (!c) return '#111'; // fallback
  const toHex = (v)=>v.toString(16).padStart(2,'0');
  return '#' + toHex(255-c.r) + toHex(255-c.g) + toHex(255-c.b);
}

/* (optional, nicer than strict invert) choose black/white based on luminance */
function contrastBW(hex){
  const c = hexToRgb(hex);
  if (!c) return '#111';
  const y = (0.2126*c.r + 0.7152*c.g + 0.0722*c.b) / 255;
  return y > 0.55 ? '#111' : '#fff';
}

  function placeWorkOnWall(work, wallName, idx, perWall, room, layout, adv) {
    const frameW = layout.frame?.w ?? 1.4;
    const frameH = layout.frame?.h ?? 2.1;
    const thick  = layout.frame?.thickness ?? 0.08;
    const spacing = layout.spacing ?? 0.6;
    const y = layout.y ?? 1.6;

    const W = room.width ?? 18;
    const D = room.depth ?? 18;

    const total = perWall * frameW + (perWall - 1) * spacing;
    const start = -total / 2 + frameW / 2;
    const slot  = start + idx * (frameW + spacing);

    let pos = { x: 0, y, z: 0 };
    let rotY = 0;
    const inset = 0.12;

    if (wallName === 'north') { pos = { x: slot,  y, z: -D/2 + inset }; rotY = 0; }
    if (wallName === 'south') { pos = { x: -slot, y, z:  D/2 - inset }; rotY = 180; }
    if (wallName === 'east')  { pos = { x:  W/2 - inset, y, z: slot  }; rotY = -90; }
    if (wallName === 'west')  { pos = { x: -W/2 + inset, y, z: -slot }; rotY = 90; }

    const normal = { x: 0, z: 0 };
    if (wallName === 'north') normal.z =  1;
    if (wallName === 'south') normal.z = -1;
    if (wallName === 'east')  normal.x = -1;
    if (wallName === 'west')  normal.x =  1;

    const artPos   = { x: pos.x + normal.x * 0.06, y: pos.y, z: pos.z + normal.z * 0.06 };
    const framePos = { x: pos.x + normal.x * 0.02, y: pos.y, z: pos.z + normal.z * 0.02 };

    const globalFrameColor = (adv && adv.frameColor) ? adv.frameColor : '#111';
    const perFrameColor = (work && (work.frameColor || work.frameColour)) ? (work.frameColor || work.frameColour) : '';
    const frameColor = (perFrameColor || globalFrameColor || '#111');

    const frame = document.createElement('a-box');
    frame.setAttribute('position', `${framePos.x} ${framePos.y} ${framePos.z}`);
    frame.setAttribute('rotation', `0 ${rotY} 0`);
    frame.setAttribute('width',  frameW + 0.14);
    frame.setAttribute('height', frameH + 0.14);
    frame.setAttribute('depth',  thick);
    frame.setAttribute('color', frameColor);
    frame.setAttribute('material', 'side: double');
    frame.setAttribute('gui-interactable', '');

    const art = document.createElement('a-plane');
    art.setAttribute('position', `${artPos.x} ${artPos.y} ${artPos.z}`);
    art.setAttribute('rotation', `0 ${rotY} 0`);
    art.setAttribute('width',  frameW);
    art.setAttribute('height', frameH);
    art.setAttribute('material', 'shader: flat; side: double; transparent: true;');
    art.setAttribute('gui-interactable', '');

    const poster = (work.posterSrc || '').trim();
    // In the cinema, we always show posters on the walls (2:3). Playback happens in the lightbox.
    const type = (work.playType || 'mp4').toLowerCase();
    if (poster) {
      // Preload into <a-assets> and reference by id (more stable than direct src on material in some browsers)
      const iref = ensureImageAsset(work, poster);
      art.setAttribute('material', `shader: flat; side: double; transparent: true; src: ${iref};`);
      art.setAttribute('fix-poster-texture', '');
    } else {
      art.setAttribute('color', '#222');
    }

    const handler = () => openLightbox({ ...work, type });
    frame.addEventListener('click', handler);
    art.addEventListener('click', handler);

    const bindInteractiveEvents = (el) => {
      el.addEventListener('mouseenter', () => { dotHoverOn(); });
      el.addEventListener('mouseleave', () => { dotHoverOff(); fuseStop(); });
      el.addEventListener('fusing',     () => { fuseStart(); });
      el.addEventListener('click',      () => { fuseStop(); });
    };

    bindInteractiveEvents(frame);
    bindInteractiveEvents(art);

    const text = document.createElement('a-text');
    text.setAttribute('value', work.title || '(Untitled)');
    text.setAttribute('align', 'center');
    const wallHex = (adv && adv.wallsColor) ? adv.wallsColor : (room.wallColorDefault || '#ffffff');
    text.setAttribute('color', contrastBW(wallHex));
    text.setAttribute('width', 3.8);
    text.setAttribute('rotation', `0 ${rotY} 0`);
    text.setAttribute('position', `${pos.x} ${pos.y - (frameH / 2 + 0.28)} ${pos.z}`);

    gallery.appendChild(frame);
    gallery.appendChild(art);
    gallery.appendChild(text);
  }

  function ensureAssets() {
    let assets = sceneEl.querySelector('a-assets');
    if (!assets) {
      assets = document.createElement('a-assets');
      sceneEl.appendChild(assets);
    }
    return assets;
  }

function ensureImageAsset(work, src) {
  const assets = ensureAssets();
  const base = String(work.id || work.title || 'poster').replace(/[^\w-]/g, '_').slice(0, 40);
  const imgId = 'img_' + base;
  let img = document.getElementById(imgId);
  if (!img) {
    img = document.createElement('img');
    img.id = imgId;
    // data: URLs don't need CORS; for http(s) it helps in some contexts
    img.crossOrigin = 'anonymous';
    assets.appendChild(img);
  }
  if (img.getAttribute('src') !== src) img.setAttribute('src', src);
  return '#' + imgId;
}

  function ensureVideoAsset(work) {
    const assets = ensureAssets();
    const vidId = 'vid_' + String(work.id || '').replace(/[^\w-]/g, '_');
    let v = document.getElementById(vidId);
    if (v) return '#' + vidId;

    v = document.createElement('video');
    v.id = vidId;
    v.src = work.mediaSrc;
    v.muted = true;
    v.autoplay = true;
    v.loop = true;
    v.playsInline = true;
    v.setAttribute('webkit-playsinline', 'true');
    v.preload = 'auto';

    v.addEventListener('loadedmetadata', () => {
      try {
        if (isFinite(v.duration) && v.duration > 1) v.currentTime = Math.min(0.4, v.duration * 0.05);
      } catch (_) {}
    });

    const kick = () => v.play().catch(() => {});
    v.addEventListener('canplay', kick, { once: true });

    assets.appendChild(v);
    return '#' + vidId;
  }

  window.addEventListener('pointerdown', () => {
    const vids = sceneEl.querySelectorAll('a-assets video');
    vids.forEach(v => { try { v.muted = true; v.play().catch(()=>{}); } catch(_){} });
  }, { once: true });


  
  function showBootError(msg){
    console.error(msg);
    let el = document.getElementById('bootError');
    if (!el){
      el = document.createElement('div');
      el.id = 'bootError';
      el.style.position = 'fixed';
      el.style.inset = '16px';
      el.style.zIndex = '999999';
      el.style.background = 'rgba(0,0,0,.75)';
      el.style.color = '#fff';
      el.style.padding = '18px';
      el.style.borderRadius = '14px';
      el.style.fontFamily = 'system-ui, sans-serif';
      el.style.fontSize = '14px';
      el.style.lineHeight = '1.4';
      el.innerHTML = '';
      document.body.appendChild(el);
    }
    el.textContent = msg;
  }

  
  function showWelcomeCinema(exhibit){
    try{
      const ex = (exhibit && exhibit.cinema) ? exhibit.cinema : {};
      const hasAny = (ex && ((ex.name||'').trim() || (ex.description||'').trim() || (ex.instructions||'').trim() || (ex.posterDataUrl||'').trim()));
      if (!hasAny) return;

      // Reset panel size for welcome
      if (lbPanel) lbPanel.classList.remove('wide');

      lbMedia.innerHTML = '';
      lbTitle.textContent = (ex.name || exhibit.title || '').trim();
      lbSub.textContent = '';
      lbDesc.style.whiteSpace = 'pre-wrap';

      const parts = [];
      if ((ex.description||'').trim()) parts.push(String(ex.description).trim());
      if ((ex.instructions||'').trim()) parts.push(String(ex.instructions).trim());
      lbDesc.textContent = parts.join('\n\n');

      // Media: image/pdf logo or fallback title
      const posterUrl = (ex.posterDataUrl || '').trim();
      const posterMime = String(ex.posterMime || '').toLowerCase();
      if (posterUrl) {
        if (posterMime.includes('pdf')) {
          const ifr = document.createElement('iframe');
          ifr.src = posterUrl;
          ifr.style.width = '100%';
          ifr.style.height = '100%';
          ifr.style.border = '0';
          ifr.title = 'Cinema logo';
          lbMedia.appendChild(ifr);
        } else {
          const img = document.createElement('img');
          img.src = posterUrl;
          img.alt = ex.name || 'Cinema logo';
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'contain';
          img.style.display = 'block';
          lbMedia.appendChild(img);
        }
      } else {
        const big = document.createElement('div');
        big.style.color = '#fff';
        big.style.fontSize = '52px';
        big.style.fontWeight = '800';
        big.style.textAlign = 'center';
        big.style.padding = '26px';
        big.style.lineHeight = '1.05';
        big.textContent = (ex.name || exhibit.title || '').trim();
        lbMedia.appendChild(big);
      }

      lb.style.display = 'flex';
      sceneEl.style.pointerEvents = 'none';
      lb.style.pointerEvents = 'auto';
      setPointerLockEnabled(false);
      disableMovement();
    } catch(e){ console.error(e); }
  }

function autoLoadCinemaFromDisk(){
    const data = window.__CINEMA__;
    if (!data) return showBootError('Missing cinema.js (window.__CINEMA__ not found). Export should include cinema.js next to index.html.');
    if (!Array.isArray(data.works)) return showBootError('Invalid cinema.js: expected { works: [...] }.');
    try {
      buildCinema(data);
      showWelcomeCinema(data);
    } catch (e) {
      showBootError('Failed to build movie theater: ' + (e && e.message ? e.message : String(e)));
    }
  }


  sceneEl.addEventListener('loaded', () => {
    if (sceneEl.canvas) sceneEl.canvas.style.touchAction = 'none';
    if (isMobile) setPointerLockEnabled(false);
    if (dot) dot.style.display = 'block';
    buildRoom({ width: 18, depth: 18, height: 4, wallColorDefault: '#ffffff' });
    autoLoadCinemaFromDisk();
  });

    placeholder: "Passcode",
    hint: "",
    prefixes: ["DCFF", "DCFF2026"],
    remember: true,
    rememberKey: "mdn_serial_ok_v1"
  };

  // =========================
  // Helpers
  // =========================
  const norm = (s) => (s || "").toUpperCase().replace(/\s+/g, "").replace(/[^A-Z0-9-]/g, "");
  const ALPHA = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";

  function makeChecksum(prefix, body12) {
    let h = 2166136261 >>> 0;
    const data = prefix + body12;
    for (let i = 0; i < data.length; i++) {
      h ^= data.charCodeAt(i);
      h = Math.imul(h, 16777619) >>> 0;
      h ^= (h >>> 13);
      h = Math.imul(h, 2246822507) >>> 0;
      h ^= (h >>> 16);
    }
    let out = "";
    for (let i = 0; i < 4; i++) out += ALPHA[(h >>> (i * 7)) & 31];
    return out;
  }

  // =========================
  // Validation (multi-prefix)
  // =========================
  function isValidSerial(serialRaw) {
    const s = norm(serialRaw);
    const prefixes = CFG.prefixes.map(p => p.toUpperCase());

    for (const p of prefixes) {
      const re = new RegExp("^" + p + "-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$");
      if (!re.test(s)) continue;

      const parts = s.split("-");
      const body12 = parts.slice(1, 4).join("");
      const check4 = parts[4];

      if (makeChecksum(p, body12) === check4) return true;
    }
    return false;
  }

  function unlock(serial) {
    document.body.style.display = "block";
    document.body.dataset.serialOk = "true";
    document.body.dataset.serial = norm(serial);
    document.documentElement.classList.remove("mdn-locked");
    document.body.classList.remove("mdn-locked");
    if (CFG.remember) {
      try { localStorage.setItem(CFG.rememberKey, "1"); } catch (_) {}
    }
  }

  function isRememberedUnlocked() {
    if (!CFG.remember) return false;
    try { return localStorage.getItem(CFG.rememberKey) === "1"; } catch (_) { return false; }
  }

  // =========================
  // UI
  // =========================
  function mount() {
    if (isRememberedUnlocked() || document.body?.dataset?.serialOk === "true") return;

    document.documentElement.classList.add("mdn-locked");
    document.body.classList.add("mdn-locked");

    const style = document.createElement("style");
    style.textContent = `
      html.mdn-locked, body.mdn-locked { overflow: hidden !important; }
      body.mdn-locked > :not(#mdn-serial-modal-root) { pointer-events: none; user-select: none; }
      #mdn-serial-modal-root{
        position:fixed; inset:0; z-index:2147483647;
        display:grid; place-items:center; padding:20px;
        background: rgba(0,0,0,.35);
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        opacity:1;
      }
      #mdn-serial-modal{
        width:min(560px,100%);
        border-radius:26px;
        background:#ffffff;
        border:3px solid rgba(0,0,0,.10);
        box-shadow:0 24px 70px rgba(0,0,0,.22);
        overflow:hidden;
        transform: translateY(10px);
        opacity:0;
        transition: opacity .22s ease, transform .22s ease;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      #mdn-serial-modal a {
      color: #000;    
      text-decoration: none; 
      }
      #mdn-serial-modal a:hover,
      #mdn-serial-modal a:active,
      #mdn-serial-modal a:visited {
      color: #000;
      text-decoration: none;
      }
      #mdn-serial-modal.mdn-in{ transform: translateY(0); opacity:1;}
      #mdn-top{ padding:26px 26px 12px; }
      #mdn-title{ margin:0; font-weight:900; font-size:26px; line-height:1.15; letter-spacing:-0.2px; color:#000; }
      #mdn-sub{ margin:10px 0 0; font-weight:700; font-size:15px; line-height:1.5; color: rgba(0,0,0,.65); }
      #mdn-body{ padding:0 26px 20px; display:grid; gap:12px; }
      #mdn-input{ width:100%; box-sizing:border-box; padding:16px 16px; border-radius:18px; border:3px solid rgba(0,0,0,.12); background:#fff; color:#000; font-weight:900; font-size:16px; letter-spacing:.6px; outline:none; margin-bottom:40px;}
      #mdn-input::placeholder{ color: rgba(0,0,0,.35); font-weight:800; letter-spacing:.2px; }
      #mdn-input:focus{ border-color: rgba(0,0,0,.55); box-shadow:0 0 0 6px rgba(0,0,0,.08); }
      #mdn-row{ display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
      .mdn-btn{ appearance:none; border:0; border-radius:18px; padding:14px 16px; cursor:pointer; font-weight:900; font-size:14px; letter-spacing:.2px; display:inline-flex; align-items:center; justify-content:center; text-decoration:none; transition: transform .06s ease, box-shadow .18s ease, background .18s ease; }
      .mdn-btn:active{ transform: translateY(1px); }
      .mdn-primary{ background:#000; color:#fff; box-shadow:0 10px 24px rgba(0,0,0,.18); }
      .mdn-primary:hover{ box-shadow:0 14px 30px rgba(0,0,0,.22); }
      .mdn-ghost{ background:#fff; color:#000; border:3px solid rgba(0,0,0,.12); }
      .mdn-ghost:hover{ border-color: rgba(0,0,0,.22); }
      .mdn-disabled{ opacity:.55; cursor:not-allowed; pointer-events:none; }
      #mdn-msg{ min-height:20px; font-weight:900; font-size:13px; color: rgba(0,0,0,.60); }
      #mdn-msg.mdn-bad{ color:#c1121f; }
      #mdn-msg.mdn-good{ color:#0a7a2f; }
      #mdn-foot{ padding:14px 26px 22px; border-top:3px solid rgba(0,0,0,.08); display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; }
      #mdn-hint{ font-weight:900; font-size:13px; color: rgba(0,0,0,.55); }
      #mdn-close{ background: transparent; border: 3px solid rgba(0,0,0,.10); color:#000; cursor:pointer; font-weight:900; font-size:12px; padding:10px 12px; border-radius:16px; }
      #mdn-close:hover{ border-color: rgba(0,0,0,.22); }
      #mdn-serial-modal-root.mdn-out{ opacity:0; transition: opacity .28s ease; }
    `;
    document.head.appendChild(style);

    const root = document.createElement("div");
    root.id = "mdn-serial-modal-root";
    root.innerHTML = `
      <div id="mdn-serial-modal" role="dialog" aria-modal="true" aria-labelledby="mdn-title">
        <div id="mdn-top">
          <div id="mdn-title">${escapeHtml(CFG.title)}</div>
          <div id="mdn-sub">${escapeHtml(CFG.subtitle)}</div>
        </div>
        <div id="mdn-body">
          <input id="mdn-input" type="text" inputmode="latin" autocomplete="off" spellcheck="false" placeholder="${escapeHtml(CFG.placeholder)}" />
          <div id="mdn-row">
            <button class="mdn-btn mdn-primary" id="mdn-activate" type="button">${escapeHtml(CFG.activateLabel)}</button>
            <a class="mdn-btn mdn-ghost" id="mdn-buy" href="#" target="_blank" rel="noopener noreferrer">${escapeHtml(CFG.buyLabel)}</a>
          </div>
          <div id="mdn-msg">${escapeHtml(CFG.hint)}</div>
        </div>
        <div id="mdn-foot">
          <div id="mdn-hint">${escapeHtml(CFG.productName)}</div>
          <button id="mdn-close" type="button">?</button>
        </div>
      </div>
    `;
    document.body.appendChild(root);

    const modal = root.querySelector("#mdn-serial-modal");
    const input = root.querySelector("#mdn-input");
    const btnActivate = root.querySelector("#mdn-activate");
    const buy = root.querySelector("#mdn-buy");
    const btnClose = root.querySelector("#mdn-close");
    const msg = root.querySelector("#mdn-msg");

    if (CFG.gumroadUrl && /^https?:\/\//i.test(CFG.gumroadUrl)) {
      buy.href = CFG.gumroadUrl;
      buy.classList.remove("mdn-disabled");
    } else {
      buy.href = "#";
      buy.classList.add("mdn-disabled");
      buy.title = "Buy Now";
    }

    requestAnimationFrame(() => modal.classList.add("mdn-in"));

    function setMsg(text, cls) {
      msg.classList.remove("mdn-good","mdn-bad");
      if(cls) msg.classList.add(cls);
      msg.textContent = text;
    }

    function fadeOutAndRemove() {
      root.classList.add("mdn-out");
      setTimeout(() => root.remove(), 320);
    }

function tryActivate() {
  const val = input.value;
  if(!val.trim()){ 
    setMsg("Please enter a password.","mdn-bad"); 
    input.focus(); 
    return; 
  }
  if(isValidSerial(val)){
    setMsg("Password accepted. Unlocking…","mdn-good");
    unlock(val);
    //  Delay 3 seconds before fading out
    setTimeout(fadeOutAndRemove, 3000);
  }else{
    setMsg("That passcode doesn’t look valid. Please check and try again.","mdn-bad");
    input.select();
  }
}

    btnActivate.addEventListener("click", tryActivate);
    input.addEventListener("keydown",(e)=>{ if(e.key==="Enter") tryActivate(); if(e.key==="Escape") setMsg(CFG.hint,null); });
    btnClose.addEventListener("click",()=>{ setMsg("Tip: Paste your passcode using Ctrl+V (Win/Lin) or Command+V (Mac).",null); });

    setTimeout(()=>input.focus(),60);
  }

  function boot(){
    if(getComputedStyle(document.body).display==="none") document.body.style.display="block";
    if(isRememberedUnlocked()){ unlock("REMEMBERED"); return; }
    mount();
  }

  if(document.readyState==="loading"){ document.addEventListener("DOMContentLoaded",boot,{once:true}); }else{ boot(); }

  window.MandolinSerial = {
    generateExample(){
      const prefixes = CFG.prefixes.map(p=>p.toUpperCase());
      const p = prefixes[0]; // just pick first prefix for example
      const rnd = ()=>Math.random().toString(36).toUpperCase().replace(/[^A-Z0-9]/g,"").padEnd(4,"A").slice(0,4);
      const a=rnd(), b=rnd(), c=rnd();
      const body12=a+b+c;
      const chk=makeChecksum(p,body12);
      return `${p}-${a}-${b}-${c}-${chk}`;
    }
  };

  function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

})();
</script>
