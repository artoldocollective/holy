<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <!-- No index / no follow -->
  <meta
    name="robots"
    content="noindex,nofollow,noarchive,nosnippet,noimageindex"
  />

  <title translate="no">Raffaela Cilento: Fashion School</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .video-wrap {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>

  <!-- Fullscreen autoplay muted responsive video -->
  <div class="video-wrap">
    <video
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline
      preload="auto"
    >
      <source src="./images/video.mp4" type="video/mp4" />
    </video>
  </div>

  <script>
    (function () {
      // Prevent duplicate button
      if (document.getElementById('hmg-back-btn')) return;

      // Load Google Material Icons
      const iconLink = document.createElement('link');
      iconLink.rel = 'stylesheet';
      iconLink.href =
        'https://fonts.googleapis.com/icon?family=Material+Icons';

      document.head.appendChild(iconLink);

      // Create back button
      const btn = document.createElement('a');

      btn.id = 'hmg-back-btn';
      btn.href =
        './index.html';

      btn.setAttribute('translate', 'no');
      btn.setAttribute('aria-label', 'Back');

      btn.innerHTML = `
        <span class="material-icons" translate="no">
          arrow_back
        </span>
      `;

      // Styling
      Object.assign(btn.style, {
        position: 'fixed',
        bottom: '20px',
        left: '20px',
        zIndex: '10000',
        width: '56px',
        height: '56px',
        borderRadius: '50%',
        background: 'rgba(0,0,0,0.82)',
        color: '#fff',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        textDecoration: 'none',
        boxShadow: '0 4px 12px rgba(0,0,0,0.35)',
        cursor: 'pointer',
        transition: 'all 0.2s ease',
        opacity: '0.92',
        backdropFilter: 'blur(4px)',
        WebkitBackdropFilter: 'blur(4px)'
      });

      // Hover effects
      btn.onmouseenter = () => {
        btn.style.transform = 'scale(1.08)';
        btn.style.opacity = '1';
      };

      btn.onmouseleave = () => {
        btn.style.transform = 'scale(1)';
        btn.style.opacity = '0.92';
      };

      document.body.appendChild(btn);
    })();
  </script>

<!-- Top / Bottom Overlay Text -->
<div id="overlay-text" translate="no">
  <div class="top-text">Raffaela Cilento</div>
  <div class="bottom-text">Fashion Teacher</div>
</div>

<style>
  #overlay-text {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    line-height: 1;
    pointer-events: none;
    text-shadow: 0 2px 10px rgba(0,0,0,0.55);
  }

  #overlay-text .top-text {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }

  #overlay-text .bottom-text {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.9;
  }

  @media (max-width: 768px) {
    #overlay-text {
      top: 18px;
      left: 18px;
    }

    #overlay-text .top-text {
      font-size: 22px;
    }

    #overlay-text .bottom-text {
      font-size: 12px;
    }
  }
</style>

</body>
</html>
